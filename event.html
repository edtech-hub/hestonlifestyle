<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Private Gallery — Heston Photo Lifestyle</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0a0a0a; --panel:#141414; --line:#262626; --text:#f4f1ec;
            --muted:#9b9b9b; --accent:#C9A962; --accent-2:#b8985a;
            --serif:'Cormorant Garamond', serif; --sans:'Montserrat', sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
        a{color:inherit;text-decoration:none}
        .container{max-width:1400px;margin:0 auto;padding:0 24px}

        /* Top bar */
        .topbar{
            position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);
            backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
        }
        .topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1400px;margin:0 auto}
        .brand{display:flex;align-items:center;gap:10px}
        .brand h1{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:.5px}
        .brand span{color:var(--accent)}
        .brand small{display:block;font-family:var(--sans);font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-top:-4px}
        .top-actions a, .top-actions button{
            background:transparent;border:1px solid var(--line);color:var(--muted);
            padding:8px 14px;border-radius:4px;font-size:12px;letter-spacing:1px;
            text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:all .25s
        }
        .top-actions a:hover, .top-actions button:hover{color:var(--accent);border-color:var(--accent)}

        /* Login */
        .login-wrap{
            min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center;padding:40px 20px
        }
        .login-card{
            width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);
            border-radius:8px;padding:48px 40px;text-align:center
        }
        .login-card .lock{font-size:32px;color:var(--accent);margin-bottom:16px}
        .login-card h2{font-family:var(--serif);font-size:32px;font-weight:500;margin-bottom:8px}
        .login-card p{color:var(--muted);font-size:13px;margin-bottom:28px}
        .login-card label{display:block;text-align:left;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
        .login-card input{
            width:100%;background:#0a0a0a;border:1px solid var(--line);color:var(--text);
            padding:14px 16px;border-radius:4px;font-size:15px;font-family:var(--sans);
            transition:border-color .2s;margin-bottom:18px
        }
        .login-card input:focus{outline:none;border-color:var(--accent)}
        .login-card button{
            width:100%;background:var(--accent);color:#0a0a0a;border:none;
            padding:14px;border-radius:4px;font-size:13px;letter-spacing:2px;
            text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;font-family:var(--sans)
        }
        .login-card button:hover{background:var(--accent-2)}
        .login-card button:disabled{opacity:.6;cursor:not-allowed}
        .hint{color:var(--muted);font-size:12px;margin-top:18px;font-style:italic}
        .err{color:#ef4444;font-size:13px;margin-top:14px;min-height:18px}

        /* Gallery */
        .gallery-hero{padding:48px 24px 24px;text-align:center;border-bottom:1px solid var(--line)}
        .gallery-hero .eyebrow{color:var(--accent);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
        .gallery-hero h1{font-family:var(--serif);font-size:48px;font-weight:500;line-height:1.1;margin-bottom:8px}
        .gallery-hero .meta{color:var(--muted);font-size:13px;letter-spacing:1px}
        .gallery-hero .meta span{margin:0 12px}
        .gallery-hero .desc{max-width:680px;margin:18px auto 0;color:#cfcfcf;font-family:var(--serif);font-size:18px;font-style:italic;line-height:1.5}

        .gallery-toolbar{
            display:flex;justify-content:space-between;align-items:center;
            padding:18px 24px;max-width:1400px;margin:0 auto;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted)
        }
        .gallery-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:6px;padding:0 6px 80px
        }
        .img-card{position:relative;overflow:hidden;background:#1a1a1a;cursor:pointer;aspect-ratio:4/3}
        .img-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
        .img-card:hover img{transform:scale(1.04)}
        .img-card .dl{
            position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;border:none;
            width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;opacity:0;transition:opacity .25s;
            display:flex;align-items:center;justify-content:center
        }
        .img-card:hover .dl{opacity:1}
        .img-card .dl:hover{background:var(--accent);color:#0a0a0a}

        /* Lightbox */
        .lightbox{
            position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:none;
            align-items:center;justify-content:center;padding:24px
        }
        .lightbox.active{display:flex}
        .lightbox img{max-width:95vw;max-height:88vh;object-fit:contain}
        .lb-close{position:absolute;top:20px;right:24px;background:transparent;border:none;color:#fff;font-size:36px;cursor:pointer;line-height:1}
        .lb-prev,.lb-next{
            position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);
            color:#fff;width:48px;height:48px;border-radius:50%;font-size:22px;cursor:pointer
        }
        .lb-prev{left:20px}.lb-next{right:20px}
        .lb-prev:hover,.lb-next:hover{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
        .lb-info{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#bbb;font-size:13px;letter-spacing:1px}
        .lb-dl{
            position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
            background:var(--accent);color:#0a0a0a;border:none;padding:10px 22px;border-radius:4px;
            font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer
        }

        .empty{padding:80px 24px;text-align:center;color:var(--muted)}
        .toast{
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:var(--panel);border:1px solid var(--accent);color:var(--text);
            padding:12px 22px;border-radius:4px;z-index:300;display:none;font-size:13px
        }
        .toast.error{border-color:#ef4444}
        .hidden{display:none !important}

        @media (max-width:640px){
            .gallery-hero h1{font-size:32px}
            .login-card{padding:32px 24px}
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <a href="/lifestyle/" class="brand">
                <div>
                    <h1>Heston<span>Photo</span></h1>
                    <small>Lifestyle</small>
                </div>
            </a>
            <div class="top-actions">
                <button id="logoutBtn" class="hidden">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Login view -->
    <div id="loginView" class="login-wrap">
        <div class="login-card">
            <div class="lock">🔒</div>
            <h2>Private Gallery</h2>
            <p>Enter the passcode provided to view your gallery.</p>
            <form id="loginForm">
                <label for="passcodeInput">Passcode</label>
                <input type="password" id="passcodeInput" autocomplete="off" required>
                <button type="submit" id="loginBtn">Unlock Gallery</button>
                <div class="hint" id="hintLine"></div>
                <div class="err" id="loginErr"></div>
            </form>
        </div>
    </div>

    <!-- Gallery view -->
    <div id="galleryView" class="hidden">
        <div class="gallery-hero">
            <div class="eyebrow" id="gMeta1"></div>
            <h1 id="gTitle">—</h1>
            <div class="meta">
                <span id="gDate"></span>
                <span id="gLoc"></span>
            </div>
            <p class="desc" id="gDesc"></p>
        </div>
        <div class="gallery-toolbar">
            <div id="gCount">0 images</div>
            <div>Click an image to view full size</div>
        </div>
        <div class="gallery-grid" id="gGrid"></div>
        <div class="empty hidden" id="gEmpty">No images uploaded yet.</div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">×</button>
        <button class="lb-prev" onclick="lbStep(-1)">‹</button>
        <button class="lb-next" onclick="lbStep(1)">›</button>
        <img id="lbImg" alt="">
        <button class="lb-dl" id="lbDl">Download</button>
        <div class="lb-info" id="lbInfo"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = (() => {
            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:3000/api';
            return 'https://hestonadminapi.edastra.in/api';
        })();

        const params = new URLSearchParams(window.location.search);
        const slug = (params.get('slug') || '').toLowerCase().trim();
        const tokenKey = `lf-event-token::${slug}`;

        const $ = id => document.getElementById(id);
        let currentImages = [];
        let lbIndex = 0;

        function showToast(msg, type) {
            const t = $('toast');
            t.textContent = msg;
            t.className = 'toast' + (type === 'error' ? ' error' : '');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        if (!slug) {
            $('loginView').innerHTML = '<div class="login-card"><h2>Gallery Not Found</h2><p>This link is missing a gallery reference. Please use the link your photographer sent you.</p></div>';
        } else {
            const existing = localStorage.getItem(tokenKey);
            if (existing) {
                loadGallery(existing).catch(() => {
                    localStorage.removeItem(tokenKey);
                    showLogin();
                });
            } else {
                showLogin();
            }
        }

        function showLogin() {
            $('loginView').classList.remove('hidden');
            $('galleryView').classList.add('hidden');
            $('logoutBtn').classList.add('hidden');
            $('passcodeInput').focus();
        }

        $('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('loginBtn');
            const err = $('loginErr');
            err.textContent = '';
            btn.disabled = true; btn.textContent = 'Verifying…';
            try {
                const res = await fetch(`${API_BASE}/lifestyle/events/login`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ slug, passcode: $('passcodeInput').value })
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Failed');
                localStorage.setItem(tokenKey, data.data.token);
                await loadGallery(data.data.token);
            } catch (e2) {
                err.textContent = e2.message || 'Incorrect passcode';
                btn.disabled = false; btn.textContent = 'Unlock Gallery';
            }
        });

        $('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem(tokenKey);
            window.location.reload();
        });

        async function loadGallery(token) {
            const res = await fetch(`${API_BASE}/lifestyle/events/${encodeURIComponent(slug)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (!res.ok || !data.success) throw new Error(data.error || 'Failed');

            const evt = data.data;
            $('loginView').classList.add('hidden');
            $('galleryView').classList.remove('hidden');
            $('logoutBtn').classList.remove('hidden');

            $('gMeta1').textContent = evt.clientName || 'Private Gallery';
            $('gTitle').textContent = evt.title || '';
            $('gDate').textContent = evt.eventDate ? new Date(evt.eventDate).toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' }) : '';
            $('gLoc').textContent = evt.location ? '· ' + evt.location : '';
            $('gDesc').textContent = evt.description || '';

            currentImages = evt.images || [];
            $('gCount').textContent = `${currentImages.length} image${currentImages.length === 1 ? '' : 's'}`;
            const grid = $('gGrid');

            if (!currentImages.length) {
                grid.innerHTML = '';
                $('gEmpty').classList.remove('hidden');
                return;
            }
            $('gEmpty').classList.add('hidden');
            grid.innerHTML = currentImages.map((img, i) => `
                <div class="img-card" onclick="openLightbox(${i})">
                    <img src="${img.imageUrl}" alt="${img.caption || ''}" loading="lazy">
                    ${img.downloadAllowed === false ? '' : `<button class="dl" onclick="event.stopPropagation();downloadImage('${img._id}')" title="Download">⬇</button>`}
                </div>
            `).join('');
        }

        function openLightbox(i) {
            lbIndex = i;
            renderLightbox();
            $('lightbox').classList.add('active');
        }
        function closeLightbox() { $('lightbox').classList.remove('active'); }
        function lbStep(d) {
            lbIndex = (lbIndex + d + currentImages.length) % currentImages.length;
            renderLightbox();
        }
        function renderLightbox() {
            const img = currentImages[lbIndex];
            $('lbImg').src = img.imageUrl;
            $('lbInfo').textContent = `${lbIndex+1} / ${currentImages.length}${img.caption ? ' · '+img.caption : ''}`;
            const dl = $('lbDl');
            if (img.downloadAllowed === false) dl.style.display = 'none';
            else { dl.style.display = ''; dl.onclick = () => downloadImage(img._id); }
        }
        document.addEventListener('keydown', (e) => {
            if (!$('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') lbStep(-1);
            if (e.key === 'ArrowRight') lbStep(1);
        });

        async function downloadImage(imageId) {
            const token = localStorage.getItem(tokenKey);
            if (!token) return;
            try {
                const res = await fetch(`${API_BASE}/lifestyle/events/${encodeURIComponent(slug)}/images/${imageId}/download`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Failed');
                window.open(data.data.url, '_blank');
            } catch (e) {
                showToast(e.message || 'Download failed', 'error');
            }
        }
    </script>
</body>
</html>
